    function resolveEndpoint(cat, a) {
      if (cat === "Phone Call") {
        if (a.connected === "No — never connected" && a.direction?.startsWith("Outbound")) return "phone_outbound_failed";
        if (a.connected === "No — never connected" && a.direction?.startsWith("Inbound")) return "phone_inbound_failed";
        if (a.audio === "Advocate can't hear patient (one-way)") return "phone_advocate_cant_hear";
        if (a.audio === "Patient can't hear advocate") return "phone_patient_cant_hear";
        if (a.audio === "Poor quality / latency / echo / jitter") return "phone_quality";
      }
      if (cat === "Video Visit") {
        if (a.advProb === "Video not showing") return "video_advocate_video";
        if (a.advProb === "Audio not working") return "video_advocate_audio";
        if (a.advProb === "Freezing / can't initiate visit") return "video_freezing";
        if (a.patProb === "Can't join the visit at all") return "video_patient_cant_join";
        if (a.patProb === "Joined but their video/audio isn't working") return "video_patient_av";
        if (a.patProb === "Can't see/hear advocate (advocate appears connected)") return "video_patient_cant_see_advocate";
      }
      if (cat === "Fax") {
        if (a.dir === "Sending — fax is failing") return "fax_send";
        if (a.dir === "Receiving — fax not arriving") return "fax_receive";
      }
      if (cat === "Messaging") {
        if (a.issue === "Advocate can't send") return "msg_cant_send";
        if (a.issue === "Patient not receiving" && a.setup === "In-platform only") return "msg_patient_not_receiving_inplatform";
        if (a.issue === "Patient not receiving") return "msg_patient_not_receiving_sms";
        if (a.issue === "Patient replied — advocate not receiving") return "msg_reply_not_received";
        if (a.issue === "UI / inbox problem") return "msg_ui";
      }
      if (cat === "Transcript") {
        if (a.logVisible === "No — nothing there at all") return "transcript_log_missing";
        if (a.state === "Missing entirely") return "transcript_missing_entirely";
        if (a.state === "Present but not loading / blank") return "transcript_not_loading";
      }
      if (cat === "Other") return "other";
      return null;
    }

    function MultiDateTimeInput({ value, onChange }) {
      const nowStr = () => {
        const now = new Date();
        const pad = n => String(n).padStart(2,"0");
        const d = `${pad(now.getMonth()+1)}/${pad(now.getDate())}/${now.getFullYear()}`;
        let h = now.getHours(), m = now.getMinutes(), ap = h>=12?"PM":"AM"; h = h%12||12;
        return `${d} at ${pad(h)}:${pad(m)} ${ap} ET`;
      };

      // Initialize default first slot with current datetime so it never starts empty
      const list = Array.isArray(value) && value.length > 0 ? value : [{ datetime: nowStr(), patient: "" }];
      const multi = list.length > 1;

      // If we just initialized a default, push it up so it persists in state
      useEffect(() => {
        if (!value || !Array.isArray(value) || value.length === 0) {
          onChange(list);
        }
      }, []);

      const updateItem = (i, key, v) => {
        const next = list.map((it, idx) => idx === i ? { ...it, [key]: v } : it);
        onChange(next);
      };
      const addItem = () => {
        onChange([...list, { datetime: nowStr(), patient: "" }]);
      };
      const removeItem = (i) => {
        const next = list.filter((_, idx) => idx !== i);
        onChange(next.length ? next : [{ datetime: nowStr(), patient: "" }]);
      };

      return (
        <div>
          {list.map((item, i) => (
            <div key={i} style={{marginBottom:10,padding: multi ? 10 : 0, border: multi ? "1px solid #e5e7eb" : "none", borderRadius:8, background: multi ? "#f9fafb" : "transparent"}}>
              {multi && (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#6b7280"}}>Call #{i+1}</div>
                  <button onClick={() => removeItem(i)} style={{background:"none",border:"none",fontSize:11,color:"#ef4444",cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
                </div>
              )}
              <DateTimeInput value={item.datetime} onChange={v => updateItem(i, "datetime", v)} />
              {multi && (
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Patient ID for this call</div>
                  <input type="text" value={item.patient || ""} onChange={e => updateItem(i, "patient", e.target.value)}
                    style={{width:"100%",padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                </div>
              )}
            </div>
          ))}
          <button onClick={addItem} style={{marginTop:4,padding:"6px 12px",border:"1px dashed #d1d5db",borderRadius:7,background:"#fff",color:"#374151",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            + Add another timestamp
          </button>
        </div>
      );
    }

    function DateTimeInput({ value, onChange }) {
      const now = new Date();
      const pad = n => String(n).padStart(2,"0");
      const toDate = d => `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${d.getFullYear()}`;
      const toTime = d => { let h=d.getHours(),m=d.getMinutes(),ap=h>=12?"PM":"AM"; h=h%12||12; return `${pad(h)}:${pad(m)} ${ap}`; };
      const toRaw  = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

      let parsedDate = "", parsedTime = "", parsedTz = "ET";
      if (value) {
        const m = value.match(/^(.+?) at (.+?) (\w+)$/);
        if (m) { parsedDate = m[1]; parsedTime = m[2]; parsedTz = m[3]; }
      }

      const [date, setDate] = useState(parsedDate || toDate(now));
      const [timeRaw, setTimeRaw] = useState(toRaw(now));
      const [timeDisp, setTimeDisp] = useState(parsedTime || toTime(now));
      const [tz, setTz] = useState(parsedTz);

      const emit = (d, t, z) => onChange(`${d} at ${t} ${z}`);
      const handleDate = e => {
        const dig = e.target.value.replace(/\D/g,"").slice(0,8);
        const out = dig.length>4 ? dig.slice(0,2)+"/"+dig.slice(2,4)+"/"+dig.slice(4) : dig.length>2 ? dig.slice(0,2)+"/"+dig.slice(2) : dig;
        setDate(out); emit(out, timeDisp, tz);
      };
      const handleTime = e => {
        const raw = e.target.value; setTimeRaw(raw);
        if (raw) { const [h,m]=raw.split(":"); let hr=parseInt(h); const ap=hr>=12?"PM":"AM"; hr=hr%12||12; const t=`${pad(hr)}:${pad(parseInt(m))} ${ap}`; setTimeDisp(t); emit(date,t,tz); }
      };
      const handleTz = e => { setTz(e.target.value); emit(date, timeDisp, e.target.value); };
      const useNow = () => { const n=new Date(); const d=toDate(n),t=toTime(n); setDate(d); setTimeRaw(toRaw(n)); setTimeDisp(t); emit(d,t,tz); };

      const inp = {width:"100%",padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"};

      return (
        <div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 130px"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Date</div>
              <input type="text" value={date} onChange={handleDate} placeholder="MM/DD/YYYY" maxLength={10} style={inp}/>
            </div>
            <div style={{flex:"1 1 110px"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Time</div>
              <input type="time" value={timeRaw} onChange={handleTime} style={inp}/>
            </div>
            <div style={{flex:"0 0 90px"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Timezone</div>
              <select value={tz} onChange={handleTz} style={{...inp,padding:"8px 6px",cursor:"pointer"}}>
                {TIMEZONES.map(z => <option key={z} value={z}>{z}</option>)}
              </select>
            </div>
          </div>
          <button onClick={useNow} style={{marginTop:6,padding:"4px 10px",border:"1px solid #d1d5db",borderRadius:6,background:"#f9fafb",color:"#374151",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>🕐 Use current time</button>
          {value && <div style={{fontSize:11,color:"#6b7280",marginTop:3}}>→ {value}</div>}
        </div>
      );
    }

    function ScreenshotField({ value, onChange }) {
      const fileRef = useRef();
      const handleFile = f => { if(!f)return; const r=new FileReader(); r.onload=e=>onChange({text:`[Screenshot: ${f.name}]`,dataUrl:e.target.result,name:f.name}); r.readAsDataURL(f); };
      return (
        <div>
          <div onClick={()=>fileRef.current.click()}
            onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/"))handleFile(f);}}
            onDragOver={e=>e.preventDefault()}
            style={{border:"2px dashed #d1d5db",borderRadius:8,padding:"0.85rem",textAlign:"center",cursor:"pointer",background:"#fafafa"}}>
            {value?.dataUrl
              ? <img src={value.dataUrl} alt={value.name} style={{maxWidth:"100%",maxHeight:120,borderRadius:5,objectFit:"contain"}}/>
              : <div><div style={{fontSize:18,marginBottom:2}}>📎</div><div style={{fontSize:12,color:"#6b7280"}}>Click or drag & drop to attach</div></div>}
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
          {value && <div style={{fontSize:11,color:"#6b7280",marginTop:3}}>✓ {value.name} — <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={e=>{e.stopPropagation();onChange(null);}}>Remove</span></div>}
        </div>
      );
    }

    function FaxCodeAdvisory({ code }) {
      const info = getFaxCodeInfo(code);
      if (!info) return null;
      return (
        <div style={{marginTop:6,padding:"8px 12px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:7,fontSize:12,color:"#78350f",lineHeight:1.5}}>
          <strong>{code} — {info.label}</strong><br/>{info.action}
        </div>
      );
    }

    function UserErrorBanner({ note }) {
      return (
        <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"0.9rem 1rem",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:"#c2410c",marginBottom:5}}>⚠️ Likely user-side issue</div>
          <div style={{fontSize:13,color:"#7c2d12",lineHeight:1.6}}>{note}</div>
        </div>
      );
    }

    function WarningModal({ step, onProceed, onChangeAnswer, onClose }) {
      const [reason, setReason] = useState("");
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"1rem"}} onClick={onClose}>
          <div style={{background:"#fff",borderRadius:12,maxWidth:440,width:"100%",padding:"1.5rem",boxShadow:"0 20px 50px rgba(0,0,0,0.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:"#dc2626",marginBottom:8}}>⚠️ Likely the issue</div>
            <div style={{fontSize:14,color:"#111827",lineHeight:1.6,marginBottom:14}}>{step.warning}</div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:14,lineHeight:1.5}}>Have the advocate or physician test this before proceeding. If they have, change your answer below. Otherwise, provide a reason and continue.</div>

            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:500,color:"#374151",display:"block",marginBottom:4}}>Reason for proceeding anyway</label>
              <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={2}
                placeholder="e.g. Advocate already tested and confirms it doesn't help..."
                style={{width:"100%",padding:"8px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none",resize:"vertical"}}/>
            </div>

            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={onChangeAnswer} style={{flex:"1 1 auto",padding:"9px 14px",border:"none",borderRadius:7,background:"#3b82f6",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                They tested it — change my answer
              </button>
              <button onClick={()=>onProceed(reason)} disabled={!reason.trim()} style={{flex:"1 1 auto",padding:"9px 14px",border:"1px solid #d1d5db",borderRadius:7,background:reason.trim()?"#fff":"#f3f4f6",color:reason.trim()?"#111827":"#9ca3af",fontSize:13,cursor:reason.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}>
                Proceed with reason
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen]       = useState("category");
      const [cat, setCat]             = useState(null);
      const [answers, setAnswers]     = useState({});
      const [branchIdx, setBranchIdx] = useState(0);
      const [tsIdx, setTsIdx]         = useState(0);
      const [tsResults, setTsResults] = useState([]);
      const [tsAnswer, setTsAnswer]   = useState("");
      const [showWarning, setShowWarning] = useState(false);
      const [escVals, setEscVals]     = useState({});
      const [guidanceKey, setGuidanceKey] = useState(null);
      const [copyError, setCopyError] = useState(false);
      const [copied, setCopied]       = useState(false);

      const tree = cat ? TREES[cat] : [];
      const visibleBranches = tree.filter(b => !b.showIf || b.showIf(answers));
      const endpointKey = cat ? resolveEndpoint(cat, answers) : null;
      const ep = endpointKey ? ENDPOINTS[endpointKey] : null;

      function startCat(c) {
        setCat(c); setAnswers({}); setBranchIdx(0); setTsIdx(0); setTsResults([]); setTsAnswer(""); setEscVals({});
        if (TREES[c].length > 0) {
          setScreen("branch");
        } else {
          const epKey = resolveEndpoint(c, {});
          if (epKey && ENDPOINTS[epKey].troubleshoot.length > 0) setScreen("troubleshoot");
          else setScreen("escalate");
        }
      }

      function pickBranch(key, val) {
        const newA = {...answers, [key]: val};
        setAnswers(newA);

        if (key === "twilioFailed" && TWILIO_GUIDANCE_MAP[val]) {
          setGuidanceKey(TWILIO_GUIDANCE_MAP[val]);
          setScreen("guidance");
          return;
        }

        const nb = TREES[cat].filter(b => !b.showIf || b.showIf(newA));
        if (branchIdx + 1 < nb.length) setBranchIdx(branchIdx + 1);
        else {
          const nextEp = resolveEndpoint(cat, newA);
          if (nextEp && ENDPOINTS[nextEp].troubleshoot.length > 0) setScreen("troubleshoot");
          else setScreen("escalate");
        }
      }

      function continueFromGuidance() {
        setGuidanceKey(null);
        const nb = TREES[cat].filter(b => !b.showIf || b.showIf(answers));
        if (branchIdx + 1 < nb.length) { setBranchIdx(branchIdx + 1); setScreen("branch"); }
        else {
          const nextEp = resolveEndpoint(cat, answers);
          if (nextEp && ENDPOINTS[nextEp].troubleshoot.length > 0) setScreen("troubleshoot");
          else setScreen("escalate");
        }
      }

      function pickTsAnswer(answer) {
        const step = ep.troubleshoot[tsIdx];
        if (answer === step.satisfyOn || step.satisfyOn.includes(answer)) {
          const newResults = [...tsResults, { q: step.q, answer, reason: null }];
          setTsResults(newResults);
          setTsAnswer("");
          if (tsIdx + 1 < ep.troubleshoot.length) setTsIdx(tsIdx + 1);
          else setScreen("escalate");
        } else {
          setTsAnswer(answer);
          setShowWarning(true);
        }
      }

      function modalProceed(reason) {
        const step = ep.troubleshoot[tsIdx];
        const newResults = [...tsResults, { q: step.q, answer: tsAnswer, reason }];
        setTsResults(newResults);
        setShowWarning(false);
        setTsAnswer("");
        if (tsIdx + 1 < ep.troubleshoot.length) setTsIdx(tsIdx + 1);
        else setScreen("escalate");
      }

      function modalChangeAnswer() {
        setShowWarning(false);
        setTsAnswer("");
      }

      function goBack() {
        if (screen === "done") { setScreen("escalate"); return; }
        if (screen === "guidance") {
          setGuidanceKey(null);
          setScreen("branch");
          return;
        }
        if (screen === "escalate") {
          if (ep?.troubleshoot.length > 0) {
            setTsIdx(ep.troubleshoot.length - 1);
            setTsResults(tsResults.slice(0, -1));
            setScreen("troubleshoot");
          } else if (visibleBranches.length > 0) {
            setBranchIdx(visibleBranches.length - 1);
            setScreen("branch");
          } else {
            setScreen("category"); setCat(null);
          }
          return;
        }
        if (screen === "troubleshoot") {
          if (tsIdx > 0) { setTsIdx(tsIdx - 1); setTsResults(tsResults.slice(0, -1)); }
          else if (visibleBranches.length > 0) { setBranchIdx(visibleBranches.length - 1); setScreen("branch"); }
          else { setScreen("category"); setCat(null); }
          return;
        }
        if (screen === "branch") {
          if (branchIdx > 0) setBranchIdx(branchIdx - 1);
          else { setScreen("category"); setCat(null); }
        }
      }

      function setEsc(key, val) { setEscVals(v => ({...v, [key]: val})); }
      function getEscText(key) {
        const v = escVals[key];
        if (!v) return "";
        if (typeof v === "string") return v;
        if (Array.isArray(v)) {
          const touched = v.filter(item => item.touched && item.datetime);
          if (touched.length === 0) return "";
          const hasVisitIds = touched.some(item => item.visitId);
          const label = touched.some(item => item.visitId !== undefined) ? "Visit" : "Call";
          if (touched.length === 1) {
            const item = touched[0];
            const extras = [];
            if (item.visitId) extras.push(`Visit ID: ${item.visitId}`);
            if (item.patient) extras.push(`Patient: ${item.patient}`);
            return extras.length > 0 ? `${item.datetime}\n${extras.join("\n")}` : item.datetime;
          }
          return touched.map((item, i) => {
            const extras = [];
            if (item.patient) extras.push(`Patient: ${item.patient}`);
            if (item.visitId) extras.push(`Visit ID: ${item.visitId}`);
            const extraStr = extras.length > 0 ? ` (${extras.join(", ")})` : "";
            return `${label} ${i+1}: ${item.datetime}${extraStr}`;
          }).join("\n");
        }
        return v.text || "";
      }

      function buildTicket() {
        if (!ep) return "";
        const escText = Object.fromEntries(ep.escalate.map(f => [f.key, getEscText(f.key)]));
        const summary = ep.summary({ answers, tsResults }, escText);
        const branchLog = visibleBranches.map(b => `${b.q}\n→ ${answers[b.key] || "—"}`).join("\n\n");
        const tsLog = tsResults.length > 0
          ? tsResults.map(r => `${r.q}\n→ ${r.answer}${r.reason ? `\n   Reason for proceeding: ${r.reason}` : ""}`).join("\n\n")
          : "(no troubleshooting steps required)";
        const escLog = ep.escalate
          .filter(f => {
            const v = getEscText(f.key);
            return v || (f.type === "screenshot" && escVals[f.key]?.dataUrl);
          })
          .map(f => `${f.label}\n→ ${getEscText(f.key) || (escVals[f.key]?.dataUrl ? `[Screenshot: ${escVals[f.key].name}]` : "—")}`)
          .join("\n\n") || "(no fields filled in)";
        const extras = (escVals.__extraShots || []).filter(s => s?.dataUrl);
        const extraLog = extras.length > 0
          ? `\n\nScreenshots\n→ ${extras.map(s => `[Screenshot: ${s.name}]`).join(", ")}`
          : "";
        return `## Summary\n\n${summary}\n\n---\n\n## Decision Path\n\n${branchLog || "(none)"}\n\n---\n\n## Troubleshooting Info\n\n${tsLog}\n\n---\n\n## Ticket Details\n\n${escLog}${extraLog}`;
      }

      function getTitle() {
        if (!ep) return "";
        const custom = (escVals.__customTitle || "").trim();
        if (custom) return custom;
        const escText = Object.fromEntries(ep.escalate.map(f => [f.key, getEscText(f.key)]));
        return ep.title(escText);
      }

      function copyTicket() {
        const text = `Title: ${getTitle()}\n\n${buildTicket()}`;
        const success = () => { setCopied(true); setCopyError(false); setTimeout(() => setCopied(false), 2000); };
        const failure = () => { setCopyError(true); setTimeout(() => setCopyError(false), 4000); };

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(success).catch(() => fallbackCopy(text, success, failure));
        } else {
          fallbackCopy(text, success, failure);
        }
      }

      function fallbackCopy(text, onSuccess, onFailure) {
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.top = "-9999px";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(ta);
          if (ok) onSuccess(); else onFailure();
        } catch (e) {
          onFailure();
        }
      }

      function reset() { setScreen("category"); setCat(null); setAnswers({}); setBranchIdx(0); setTsIdx(0); setTsResults([]); setTsAnswer(""); setEscVals({}); setGuidanceKey(null); }

      const totalSteps = visibleBranches.length + (ep?.troubleshoot.length || 0) + 1;
      let currentStep = 0;
      if (screen === "branch") currentStep = branchIdx;
      else if (screen === "troubleshoot") currentStep = visibleBranches.length + tsIdx;
      else if (screen === "escalate") currentStep = totalSteps - 1;
      else if (screen === "done") currentStep = totalSteps;
      const progress = screen === "category" ? 2 : screen === "done" ? 100 : Math.round((currentStep / totalSteps) * 93) + 4;

      const col = cat ? CAT_COLORS[cat] : null;
      const pill = col && <span style={{display:"inline-block",padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:500,marginBottom:"1.25rem",background:col.bg,color:col.text,border:`1px solid ${col.border}`}}>{cat}</span>;
      const backBtn = <button onClick={goBack} style={{fontSize:13,color:"#6b7280",background:"none",border:"none",cursor:"pointer",padding:0,marginBottom:"1.25rem",display:"block",fontFamily:"inherit"}}>← Back</button>;
      const btn = (onClick, label, style={}) => <button onClick={onClick} style={{padding:"9px 18px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",color:"#111827",fontSize:14,cursor:"pointer",fontFamily:"inherit",...style}}>{label}</button>;

      const tsStep = ep?.troubleshoot[tsIdx];

      return (
        <div style={{maxWidth:560,margin:"0 auto",padding:"1.5rem 1rem 6rem",fontFamily:"system-ui,-apple-system,sans-serif",position:"relative",minHeight:"100vh"}}>

          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fef3c7",borderTop:"1px solid #fbbf24",padding:"8px 16px",textAlign:"center",fontSize:12,color:"#78350f",fontWeight:500,zIndex:50}}>
            ⚠️ Do not enter PHI
          </div>

          <div style={{height:3,background:"#e5e7eb",borderRadius:2,marginBottom:"2rem"}}>
            <div style={{height:3,background:"#3b82f6",borderRadius:2,width:`${progress}%`,transition:"width 0.3s"}}/>
          </div>

          {showWarning && tsStep && (
            <WarningModal step={tsStep} onProceed={modalProceed} onChangeAnswer={modalChangeAnswer} onClose={modalChangeAnswer} />
          )}

          {screen === "category" && (
            <div>
              <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",color:"#9ca3af",marginBottom:6}}>Step 1</div>
              <div style={{fontSize:18,fontWeight:600,color:"#111827",marginBottom:16}}>What type of issue is this?</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{CATEGORIES.map(c => btn(() => startCat(c), c))}</div>
            </div>
          )}

          {screen === "branch" && visibleBranches[branchIdx] && (
            <div>
              {backBtn}{pill}
              <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",color:"#9ca3af",marginBottom:6}}>
                Question {branchIdx + 1} of {visibleBranches.length}
              </div>
              <div style={{fontSize:18,fontWeight:600,color:"#111827",marginBottom:visibleBranches[branchIdx].hint?6:16,lineHeight:1.4}}>{visibleBranches[branchIdx].q}</div>
              {visibleBranches[branchIdx].hint && <div style={{fontSize:13,color:"#6b7280",marginBottom:14,lineHeight:1.5}}>{visibleBranches[branchIdx].hint}</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {visibleBranches[branchIdx].opts.map(o => btn(() => pickBranch(visibleBranches[branchIdx].key, o), o))}
              </div>
            </div>
          )}

          {screen === "guidance" && guidanceKey && GUIDANCE[guidanceKey] && (() => {
            const g = GUIDANCE[guidanceKey];
            return (
              <div>
                {backBtn}{pill}
                <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:10,padding:"1.25rem",marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:"#b45309",marginBottom:6}}>🔧 Troubleshooting guidance</div>
                  <div style={{fontSize:18,fontWeight:600,color:"#78350f",marginBottom:4,lineHeight:1.3}}>{g.title}</div>
                  <div style={{fontSize:13,color:"#92400e",fontStyle:"italic",marginBottom:12}}>{g.severity}</div>
                  <div style={{fontSize:13,color:"#78350f",lineHeight:1.6,marginBottom:14}}>{g.description}</div>

                  <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:"#b45309",marginBottom:8}}>Recommended steps</div>
                  <ol style={{margin:0,paddingLeft:20,fontSize:13,color:"#78350f",lineHeight:1.7}}>
                    {g.steps.map((s,i) => <li key={i} style={{marginBottom:4}}>{s}</li>)}
                  </ol>

                  {g.note && (
                    <div style={{marginTop:14,padding:"10px 12px",background:"#fef3c7",borderRadius:7,fontSize:12,color:"#78350f",lineHeight:1.5}}>
                      <strong>Note:</strong> {g.note}
                    </div>
                  )}
                </div>

                <div style={{fontSize:13,color:"#6b7280",marginBottom:12,lineHeight:1.5}}>If the advocate hasn't completed these steps yet, have them try first. If they've tried and the issue persists, continue to log a ticket.</div>

                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={continueFromGuidance} style={{padding:"10px 22px",border:"none",borderRadius:8,background:"#3b82f6",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Continue to ticket →</button>
                  <button onClick={reset} style={{padding:"10px 22px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",color:"#374151",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Cancel — no ticket needed</button>
                </div>
              </div>
            );
          })()}

          {screen === "troubleshoot" && tsStep && (
            <div>
              {backBtn}{pill}
              {ep.userError && <UserErrorBanner note={ep.userErrorNote} />}
              <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",color:"#9ca3af",marginBottom:6}}>
                Troubleshooting {tsIdx + 1} of {ep.troubleshoot.length}
              </div>
              <div style={{fontSize:17,fontWeight:600,color:"#111827",marginBottom:14,lineHeight:1.4}}>{tsStep.q}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {btn(() => pickTsAnswer("Yes"), "Yes")}
                {btn(() => pickTsAnswer("No"), "No")}
                {btn(() => pickTsAnswer("Unknown"), "Unknown")}
                {tsStep.satisfyOn.includes("All") && btn(() => pickTsAnswer("All"), "All")}
                {tsStep.satisfyOn.includes("N/A") && btn(() => pickTsAnswer("N/A"), "N/A")}
                {tsStep.q.toLowerCase().includes("all patients") && btn(() => pickTsAnswer("Just one"), "Just one")}
              </div>
            </div>
          )}

          {screen === "escalate" && ep && (
            <div>
              {backBtn}{pill}
              <div style={{fontSize:17,fontWeight:600,color:"#111827",marginBottom:4}}>Ticket details</div>
              <div style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Fill in what the guide requires for this issue type. All fields optional.</div>

              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:13,fontWeight:500,color:"#374151",marginBottom:4}}>Ticket title</label>
                <div style={{fontSize:12,color:"#9ca3af",marginBottom:5,lineHeight:1.5}}>Override the auto-generated title. Leave blank to use the default.</div>
                <input type="text" value={escVals.__customTitle||""} onChange={e=>setEsc("__customTitle", e.target.value)}
                  placeholder={ep.title(Object.fromEntries(ep.escalate.map(f => [f.key, getEscText(f.key)])))}
                  style={{width:"100%",padding:"9px 11px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
              </div>

              {ep.escalate.map(f => (
                <div key={f.key} style={{marginBottom:16}}>
                  <label style={{display:"block",fontSize:13,fontWeight:500,color:"#374151",marginBottom:4}}>{f.label}</label>
                  {f.hint && <div style={{fontSize:12,color:"#9ca3af",marginBottom:5,lineHeight:1.5}}>{f.hint}</div>}
                  {f.type === "textarea" && (
                    <div style={{fontSize:11,color:"#b45309",marginBottom:5,lineHeight:1.4,padding:"4px 8px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:5}}>
                      ⚠️ Do not enter PHI. Reference the patient by ID only.
                    </div>
                  )}
                  {f.type === "text" && (
                    <>
                      <input type="text" value={escVals[f.key]||""} onChange={e=>setEsc(f.key, e.target.value)}
                        style={{width:"100%",padding:"9px 11px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                      {f.key === "errCode" && <FaxCodeAdvisory code={escVals[f.key]} />}
                    </>
                  )}
                  {f.type === "textarea" && (
                    <textarea value={escVals[f.key]||""} onChange={e=>setEsc(f.key, e.target.value)} rows={3}
                      style={{width:"100%",padding:"9px 11px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none",resize:"vertical"}}/>
                  )}
                  {f.type === "datetime" && <DateTimeInput value={escVals[f.key]||""} onChange={v=>setEsc(f.key, v)}/>}
                  {f.type === "datetime_multi" && <MultiDateTimeInput value={escVals[f.key]||null} onChange={v=>setEsc(f.key, v)}/>}
                  {f.type === "datetime_multi_video" && <MultiDateTimeInput value={escVals[f.key]||null} onChange={v=>setEsc(f.key, v)} withVisitId={true}/>}
                  {f.type === "screenshot" && <ScreenshotField value={escVals[f.key]||null} onChange={v=>setEsc(f.key, v)}/>}
                </div>
              ))}

              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:13,fontWeight:500,color:"#374151",marginBottom:4}}>Screenshots</label>
                <div style={{fontSize:12,color:"#9ca3af",marginBottom:5,lineHeight:1.5}}>Attach any screenshots that may help engineering (UI, error messages, etc.)</div>
                {(escVals.__extraShots || []).map((s, i) => (
                  <div key={i} style={{marginBottom:8,border:"1px solid #e5e7eb",borderRadius:8,padding:8,background:"#f9fafb"}}>
                    <ScreenshotField value={s} onChange={v => {
                      const arr = [...(escVals.__extraShots || [])];
                      if (v === null) arr.splice(i, 1);
                      else arr[i] = v;
                      setEsc("__extraShots", arr);
                    }} />
                  </div>
                ))}
                <button onClick={() => {
                  const arr = [...(escVals.__extraShots || []), null];
                  setEsc("__extraShots", arr);
                }} style={{padding:"7px 14px",border:"1px dashed #d1d5db",borderRadius:8,background:"#fff",color:"#374151",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  + Add screenshot
                </button>
              </div>

              <button onClick={()=>setScreen("done")} style={{marginTop:8,padding:"10px 24px",border:"none",borderRadius:8,background:"#3b82f6",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                Generate ticket →
              </button>
            </div>
          )}

          {screen === "done" && ep && (
            <div>
              <div style={{marginBottom:"1rem"}}>
                <div style={{fontSize:17,fontWeight:600,color:"#111827",marginBottom:4}}>✓ Ticket ready</div>
                <div style={{fontSize:13,color:"#6b7280"}}>Title: <strong>{getTitle()}</strong></div>
                <div style={{fontSize:13,color:"#6b7280",marginTop:2}}>Paste into the Linear description.</div>
              </div>

              <div style={{background:"#f9fafb",borderRadius:10,border:"1px solid #e5e7eb",padding:"1.25rem",fontFamily:"ui-monospace,monospace",fontSize:12,color:"#111827",whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:380,overflowY:"auto"}}>
                {buildTicket()}
              </div>

              <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap",alignItems:"center"}}>
                {btn(copyTicket, copied ? "✓ Copied!" : copyError ? "Copy failed — select text above" : "Copy to clipboard", copyError ? {borderColor:"#ef4444",color:"#ef4444"} : {})}
                {btn(reset, "Start a new ticket")}
              </div>

              {(() => {
                const shots = ep.escalate.filter(f => f.type === "screenshot" && escVals[f.key]?.dataUrl).map(f => ({label: f.label, ...escVals[f.key]}));
                const extras = (escVals.__extraShots || []).filter(s => s?.dataUrl).map((s, i) => ({label: `Screenshot ${i+1}`, ...s}));
                const allShots = [...shots, ...extras];
                if (allShots.length === 0) return null;
                return (
                  <div style={{marginTop:24}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>📎 Attached screenshots — drag into Linear</div>
                    {allShots.map((s,i) => (
                      <div key={i} style={{border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden",background:"#f9fafb",marginBottom:12}}>
                        <div style={{padding:"8px 12px",fontSize:12,color:"#6b7280",borderBottom:"1px solid #e5e7eb"}}>{s.label}</div>
                        <img src={s.dataUrl} alt={s.name} style={{width:"100%",display:"block",maxHeight:250,objectFit:"contain",background:"#fff"}}/>
                        <div style={{padding:"6px 12px",fontSize:11,color:"#9ca3af"}}>{s.name}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
